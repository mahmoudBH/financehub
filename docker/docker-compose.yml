services:
  mysql:
    image: mysql:8.0
    container_name: finance_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: finance_dashboard
      MYSQL_USER: finance_user
      MYSQL_PASSWORD: finance_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - finance_network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finance_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - finance_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: finance_api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: mysql://finance_user:finance_password@mysql:3306/finance_dashboard
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3001
      JWT_ACCESS_SECRET: super-secret-access-key-docker
      JWT_REFRESH_SECRET: super-secret-refresh-key-docker
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance_network

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: finance_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_APP_NAME: FinanceHub
    depends_on:
      - api
    networks:
      - finance_network

volumes:
  mysql_data:
  redis_data:

networks:
  finance_network:
    driver: bridge
